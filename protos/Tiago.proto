#VRML_SIM R2025a utf8
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/devices/hokuyo/protos/HokuyoUrg04lxug01.proto"
EXTERNPROTO "/home/nox/Escritorio/MobileManipulatorsLab/MobileManipulators/protos/Astra.proto"
EXTERNPROTO "/home/nox/Escritorio/MobileManipulatorsLab/MobileManipulators/protos/TiagoBase.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/robots/pal_robotics/tiago_extensions/protos/TiagoBody.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/robots/pal_robotics/tiago_extensions/protos/TiagoFrontArm.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/robots/pal_robotics/tiago_extensions/protos/TiagoGripper.proto"

PROTO Tiago [
  field  SFVec3f     translation      0 0 0.095
  field  SFRotation  rotation         0 0 1 0
  field  SFString    name             "TIAGo"
  field  SFString    controller       "tiago"
  field  MFString    controllerArgs   []
  field  SFString    window           "<generic>"
  field  SFString    customData       ""
  field  SFBool      supervisor       FALSE
  field  SFBool      synchronization  TRUE
  field  SFBool      selfCollision    FALSE
  field  SFNode      endEffectorSlot  TiagoGripper {}
  field  MFNode      cameraSlot       Astra { translation -0.028 -0.035 -0.009 rotation 1 0 0 -1.5708}
  field  MFNode      lidarSlot        HokuyoUrg04lxug01 {}
]
{
  TiagoBase {
  translation IS translation
  rotation IS rotation
  controller IS controller
  controllerArgs IS controllerArgs
  window IS window
  customData IS customData
  supervisor IS supervisor
  synchronization IS synchronization
  selfCollision IS selfCollision
  name IS name
  model "PAL Robotics - TIAGo"
  bodySlot [
    TiagoBody {
      cameraSlot IS cameraSlot
      frontArmSlot TiagoFrontArm {
        endEffectorSlot IS endEffectorSlot
      }
    }
  ]
  lidarSlot IS lidarSlot
  gpsSlot [
    GPS {
      name "gps"
      translation 0 0 0
    }
  ]
  compassSlot [
    Compass {
      name "compass"
      translation 0 0 0
    }
  ]
}
}
